name: "Build and Deploy Web"

on:
  push:
    branches:
      - main
    paths:
      - 'hl-web/**'
      - '.github/workflows/build-web.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: hl-deals-web-dev
  ENVIRONMENT: dev

jobs:
  build-and-deploy:
    name: Build & Deploy to S3/CloudFront
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./hl-web
        run: npm ci

      - name: Build Angular Application
        working-directory: ./hl-web
        run: npm run build -- --configuration production

      - name: Sync Static Assets to S3
        working-directory: ./hl-web/dist/hl-web/browser
        run: |
          aws s3 sync . "s3://${{ env.S3_BUCKET }}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"
            
      - name: Upload index.html without cache
        working-directory: ./hl-web/dist/hl-web/browser
        run: |
          aws s3 cp index.html "s3://${{ env.S3_BUCKET }}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront Cache
        run: |
          CF_DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='hl-deals-web-${{ env.ENVIRONMENT }}'].Id | [0]" --output text 2>/dev/null || true)
          if [[ -n "$CF_DIST_ID" && "$CF_DIST_ID" != "None" ]]; then
            aws cloudfront create-invalidation --distribution-id "$CF_DIST_ID" --paths "/*"
            echo "Invalidation created for $CF_DIST_ID"
          else
            echo "CloudFront Distribution not found. Skipping invalidation."
          fi
